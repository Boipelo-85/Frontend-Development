<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay Updated Newsletter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <h1>Stay updated!</h1>
            
            <div class="benefits">
                <div class="benefit-item">
                    <img src="icon-list.svg" alt="checkmark" class="benefit-icon">
                    <span>Product discovery and building what matters</span>
                </div>
                <div class="benefit-item">
                    <img src="icon-list.svg" alt="checkmark" class="benefit-icon">
                    <span>Measuring to ensure updates are a success</span>
                </div>
                <div class="benefit-item">
                    <img src="icon-list.svg" alt="checkmark" class="benefit-icon">
                    <span>And much more!</span>
                </div>
            </div>

            <div class="form-group">
                <div class="label-wrapper">
                    <label for="email">Email address</label>
                    <span class="error-message" id="error-message">Valid email required</span>
                </div>
                
                <input 
                    type="email" 
                    id="email" 
                    placeholder="email@company.com"
                >
              
            </div>

            <button class="subscribe-btn">Subscribe to monthly newsletter</button>
        </div>
         
        <div class="right-section">
            <picture>
                <source media="(max-width: 768px)" srcset="illustration-sign-up-mobile.svg">
                <img src="illustration-sign-up-desktop.svg" alt="newsletter illustration" class="illustration">
            </picture>
        </div>
    </div>


    <div class="success-modal" id="successModal"> 
        <div class="success-content"> 
            <div class="success-icon"> 
                <img src="icon-success.svg" alt="success checkmark">
            </div>
            <h2>Thanks for subscribing!</h2>
            <p>A confirmation email has been sent to <strong id="confirmation-email"></strong>. Please open it and click the button inside to confirm your subscription.</p>
            <button class="dismiss-btn" id="dismissBtn">Dismiss message</button>
        </div>        
    </div>
    <script src="script.js"></script>
</body>
</html>
